<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  @page { size: 279.4mm 215.9mm; margin: 0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* ─── Fuentes self-hosted (Inter cuerpo, Rajdhani títulos) ─── */
  @font-face { font-family: 'Inter'; src: url('assets/fonts/inter/Inter-Regular.ttf') format('truetype'); font-weight: 400; font-style: normal; }
  @font-face { font-family: 'Inter'; src: url('assets/fonts/inter/Inter-SemiBold.ttf') format('truetype'); font-weight: 600; font-style: normal; }
  @font-face { font-family: 'Inter'; src: url('assets/fonts/inter/Inter-Bold.ttf') format('truetype'); font-weight: 700; font-style: normal; }
  @font-face { font-family: 'Rajdhani'; src: url('assets/fonts/rajdhani/Rajdhani-Medium.ttf') format('truetype'); font-weight: 500; font-style: normal; }
  @font-face { font-family: 'Rajdhani'; src: url('assets/fonts/rajdhani/Rajdhani-SemiBold.ttf') format('truetype'); font-weight: 600; font-style: normal; }
  @font-face { font-family: 'Rajdhani'; src: url('assets/fonts/rajdhani/Rajdhani-Bold.ttf') format('truetype'); font-weight: 700; font-style: normal; }

  body {
    width: 279.4mm; height: 215.9mm;
    font-family: 'Inter', 'Arial', sans-serif;
    background: #fff;
    position: relative; overflow: hidden;
  }

  /* ─── Borde dorado clásico ─── */
  .marco-ext {
    position: absolute; inset: 7mm;
    border: 3px solid #b8860b;
    border-radius: 10px;
  }
  .marco-int {
    position: absolute; inset: 10mm;
    border: 1.5px solid #daa520;
    border-radius: 7px;
  }
  .esq { position: absolute; width: 35mm; height: 35mm; }
  .esq svg { width: 100%; height: 100%; }
  .esq-tl { top: 7mm; left: 7mm; }
  .esq-tr { top: 7mm; right: 7mm; transform: scaleX(-1); }
  .esq-bl { bottom: 7mm; left: 7mm; transform: scaleY(-1); }
  .esq-br { bottom: 7mm; right: 7mm; transform: scale(-1); }

  .contenido {
    position: relative; z-index: 10;
    height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: space-between;
    padding: 20mm; text-align: center;
  }

  .header { display: flex; flex-direction: column; align-items: center; gap: 3mm; }
  .logo-agasi { width: 55mm; height: auto; }

  .titulo {
    font-family: 'Rajdhani', 'Arial', sans-serif;
    font-size: 34pt; font-weight: 700; color: #8b6914; letter-spacing: 6px;
    margin-top: 4mm;
  }
  .subtitulo {
    font-family: 'Rajdhani', 'Arial', sans-serif;
    font-size: 12pt; font-weight: 500; color: #b8860b; letter-spacing: 4px;
    text-transform: uppercase; margin-top: 1mm;
  }

  .cuerpo {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 3mm;
  }
  .nombre {
    font-family: 'Rajdhani', 'Arial', sans-serif;
    font-size: 30pt; font-weight: 600; color: #1a1a2e;
    border-bottom: 2px solid #daa520; padding-bottom: 2mm; min-width: 60%;
  }
  .desc {
    font-size: 11pt; color: #444; max-width: 75%; line-height: 1.5;
  }
  .curso-txt {
    font-family: 'Rajdhani', 'Arial', sans-serif;
    font-size: 15pt; font-weight: 600; color: #8b6914;
  }

  .footer {
    display: flex; justify-content: center;
    align-items: flex-end; width: 100%; padding: 0 18mm; margin-top: 6mm;
  }
  .firma { display: flex; flex-direction: column; align-items: center; gap: 1mm; flex: 1; }
  .firma-img { height: 22mm; object-fit: contain; margin-bottom: 1mm; opacity: 0.9; }
  .firma-linea { width: 45mm; border-top: 1px solid #333; padding-top: 1mm; }
  .firma-nombre { font-size: 8pt; font-weight: bold; color: #333; }
  .firma-puesto { font-size: 7pt; color: #666; }

  .folio {
    position: absolute; bottom: 11mm; right: 18mm;
    font-size: 7pt; color: #aaa;
  }
  .stps {
    position: absolute; bottom: 11mm; left: 18mm;
    font-size: 7pt; color: #888; letter-spacing: 0.5px;
  }
</style>
</head>
<body>
  <div class="marco-ext"></div>
  <div class="marco-int"></div>

  <div class="esq esq-tl">
    <svg viewBox="0 0 100 100">
      <path d="M5,5 L5,40 M5,5 L40,5 M10,10 L10,30 M10,10 L30,10" stroke="#daa520" stroke-width="0.8" fill="none"/>
      <circle cx="12" cy="12" r="3" fill="#daa520" opacity="0.3"/>
    </svg>
  </div>
  <div class="esq esq-tr">
    <svg viewBox="0 0 100 100">
      <path d="M5,5 L5,40 M5,5 L40,5 M10,10 L10,30 M10,10 L30,10" stroke="#daa520" stroke-width="0.8" fill="none"/>
      <circle cx="12" cy="12" r="3" fill="#daa520" opacity="0.3"/>
    </svg>
  </div>
  <div class="esq esq-bl">
    <svg viewBox="0 0 100 100">
      <path d="M5,5 L5,40 M5,5 L40,5 M10,10 L10,30 M10,10 L30,10" stroke="#daa520" stroke-width="0.8" fill="none"/>
      <circle cx="12" cy="12" r="3" fill="#daa520" opacity="0.3"/>
    </svg>
  </div>
  <div class="esq esq-br">
    <svg viewBox="0 0 100 100">
      <path d="M5,5 L5,40 M5,5 L40,5 M10,10 L10,30 M10,10 L30,10" stroke="#daa520" stroke-width="0.8" fill="none"/>
      <circle cx="12" cy="12" r="3" fill="#daa520" opacity="0.3"/>
    </svg>
  </div>

  <div class="contenido">
    <div class="header">
      <img class="logo-agasi" src="assets/AGASI.png" alt="AGASI">
    </div>
    <div class="cuerpo">
      <div class="titulo">RECONOCIMIENTO</div>
      <div class="subtitulo">Se otorga a</div>
      <div class="nombre">{{nombre}}</div>
      <div class="desc">Por haber concluido satisfactoriamente el curso de capacitación:</div>
      <div class="curso-txt">{{curso}}</div>
      <div class="desc">Con una duración de <strong>{{duracion}}</strong> horas<br>Celebrado en {{lugar}} el {{fecha}}</div>
    </div>
    <div class="footer">
      <div class="firma">
        <img class="firma-img" src="{{firma_instructor}}" alt="" onerror="this.style.display='none'">
        <div class="firma-linea"></div>
        <div class="firma-nombre">{{director_nombre}}</div>
        <div class="firma-puesto">{{director_puesto}}</div>
      </div>
    </div>
  </div>
  <div class="stps">REG.STPS: {{reg_stps}}</div>
  <div class="folio">Folio: {{folio}}</div>
</body>
</html>
