<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  @page { size: 279.4mm 215.9mm; margin: 0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* ─── Fuentes self-hosted (Inter cuerpo, Rajdhani títulos) ─── */
  @font-face { font-family: 'Inter'; src: url('assets/fonts/inter/Inter-Regular.ttf') format('truetype'); font-weight: 400; font-style: normal; }
  @font-face { font-family: 'Inter'; src: url('assets/fonts/inter/Inter-SemiBold.ttf') format('truetype'); font-weight: 600; font-style: normal; }
  @font-face { font-family: 'Inter'; src: url('assets/fonts/inter/Inter-Bold.ttf') format('truetype'); font-weight: 700; font-style: normal; }
  @font-face { font-family: 'Rajdhani'; src: url('assets/fonts/rajdhani/Rajdhani-Medium.ttf') format('truetype'); font-weight: 500; font-style: normal; }
  @font-face { font-family: 'Rajdhani'; src: url('assets/fonts/rajdhani/Rajdhani-SemiBold.ttf') format('truetype'); font-weight: 600; font-style: normal; }
  @font-face { font-family: 'Rajdhani'; src: url('assets/fonts/rajdhani/Rajdhani-Bold.ttf') format('truetype'); font-weight: 700; font-style: normal; }

  body {
    width: 279.4mm; height: 215.9mm;
    font-family: 'Inter', 'Arial', sans-serif;
    color: #1a1a2e; background: #fff;
    position: relative; overflow: hidden;
  }

  /* Formas geométricas a la izquierda (Certificado 3.svg) */
  .geometria {
    position: absolute; left: 0; top: 0;
    height: 100%; width: auto;
  }

  /* Logo AGASI — al centro-izquierda, entre los diamantes (logo grande) */
  .logo-gotita {
    position: absolute; top: 50%; left: 68mm;
    transform: translate(-50%, -50%);
    width: 75mm; height: auto;
    z-index: 2;
  }

  /* Registro STPS — esquina inferior derecha */
  .stps {
    position: absolute; bottom: 22mm; right: 22mm;
    font-size: 7.5pt; color: #555; letter-spacing: 0.5px;
    z-index: 2;
  }

  /* Texto a la derecha, dejando espacio para las formas + logo */
  .contenido {
    position: absolute; right: 0; top: 0;
    width: 165mm; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 20mm 20mm 22mm 12mm;
    text-align: center; gap: 3mm;
  }

  .header { display: flex; flex-direction: column; align-items: center; gap: 1mm; margin-bottom: 2mm; }
  .logo-agasi { width: 50mm; height: auto; }

  .titulo { font-family: 'Rajdhani', 'Arial', sans-serif; font-size: 34pt; font-weight: 700; color: #018baa; letter-spacing: 6px; }
  .subtitulo { font-family: 'Rajdhani', 'Arial', sans-serif; font-size: 12pt; font-weight: 500; color: #888; letter-spacing: 4px; text-transform: uppercase; }

  .cuerpo { display: flex; flex-direction: column; align-items: center; gap: 3mm; }
  .nombre {
    font-family: 'Rajdhani', 'Arial', sans-serif;
    font-size: 30pt; font-weight: 600; color: #1a1a2e;
    border-bottom: 1.5px solid #018baa; padding-bottom: 2mm; min-width: 65%;
  }
  .desc { font-size: 10.5pt; color: #444; max-width: 85%; line-height: 1.5; }
  .curso-txt { font-family: 'Rajdhani', 'Arial', sans-serif; font-size: 16pt; font-weight: 600; color: #018baa; }
  .detalles { font-size: 10pt; color: #444; line-height: 1.6; }

  .footer {
    display: flex; justify-content: center;
    align-items: flex-end; width: 100%;
    padding: 0 5mm; margin-top: 8mm;
  }
  .firma { display: flex; flex-direction: column; align-items: center; gap: 1mm; flex: 1; }
  .firma-img { height: 16mm; object-fit: contain; margin-bottom: 1mm; opacity: 0.9; }
  .firma-linea { width: 40mm; border-top: 1px solid #333; padding-top: 1mm; }
  .firma-nombre { font-size: 8.5pt; font-weight: bold; color: #333; }
  .firma-puesto { font-size: 7pt; color: #666; }

  .folio {
    position: absolute; bottom: 14mm; right: 22mm;
    font-size: 7.5pt; color: #555;
    z-index: 2;
  }
</style>
</head>
<body>
  <img class="geometria" src="plantillas/Reconocimientos/Certificado 3.svg" alt="">
  <img class="logo-gotita" src="Gotita.png" alt="AGASI">

  <div class="contenido">
    <div class="header">
      <img class="logo-agasi" src="assets/AGASI.png" alt="AGASI">
    </div>

    <div class="titulo">RECONOCIMIENTO</div>
    <div class="subtitulo">Se otorga a</div>

    <div class="cuerpo">
      <div class="nombre">{{nombre}}</div>
      <div class="desc">Por haber concluido satisfactoriamente el curso de capacitación:</div>
      <div class="curso-txt">{{curso}}</div>
      <div class="detalles">
        Con una duración de <strong>{{duracion}}</strong> horas<br>
        Celebrado en {{lugar}} el {{fecha}}
      </div>
    </div>

    <div class="footer">
      <div class="firma">
        <img class="firma-img" src="{{firma_instructor}}" alt="" onerror="this.style.display='none'">
        <div class="firma-linea"></div>
        <div class="firma-nombre">{{director_nombre}}</div>
        <div class="firma-puesto">{{director_puesto}}</div>
      </div>
    </div>
  </div>

  <div class="stps">REG.STPS: {{reg_stps}}</div>
  <div class="folio">Folio: {{folio}}</div>
</body>
</html>
