<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  @page { size: A4 landscape; margin: 0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* ─── Fuentes self-hosted (Inter cuerpo, Rajdhani títulos) ─── */
  @font-face { font-family: 'Inter'; src: url('assets/fonts/inter/Inter-Regular.ttf') format('truetype'); font-weight: 400; font-style: normal; }
  @font-face { font-family: 'Inter'; src: url('assets/fonts/inter/Inter-SemiBold.ttf') format('truetype'); font-weight: 600; font-style: normal; }
  @font-face { font-family: 'Inter'; src: url('assets/fonts/inter/Inter-Bold.ttf') format('truetype'); font-weight: 700; font-style: normal; }
  @font-face { font-family: 'Rajdhani'; src: url('assets/fonts/rajdhani/Rajdhani-Medium.ttf') format('truetype'); font-weight: 500; font-style: normal; }
  @font-face { font-family: 'Rajdhani'; src: url('assets/fonts/rajdhani/Rajdhani-SemiBold.ttf') format('truetype'); font-weight: 600; font-style: normal; }
  @font-face { font-family: 'Rajdhani'; src: url('assets/fonts/rajdhani/Rajdhani-Bold.ttf') format('truetype'); font-weight: 700; font-style: normal; }

  body {
    width: 297mm; height: 210mm;
    font-family: 'Inter', 'Arial', sans-serif;
    color: #000; background: #fff;
    display: flex; flex-direction: column;
  }

  /* ─── Banda azul superior pegada al tope ─── */
  .banda-sup {
    height: 26mm; flex-shrink: 0;
    background: linear-gradient(135deg, #1a4786 0%, #2563eb 100%);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 15mm;
    position: relative;
  }
  .banda-left {
    display: flex; flex-direction: column;
  }
  .banda-sup .logo-agasi {
    height: 18mm; width: auto;
  }
  .banda-sup .folio-mod {
    font-size: 8pt; color: rgba(255,255,255,0.7);
  }

  /* ─── Franja lateral decorativa ─── */
  .barra-lat {
    position: absolute; top: 26mm; bottom: 0; left: 0;
    width: 5mm; background: #2563eb; opacity: 0.12;
  }

  /* ─── Contenido principal ocupa el resto del espacio ─── */
  .contenido {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 12mm 20mm 12mm 16mm;
    text-align: center; gap: 3mm;
  }

  .titulo-mod {
    font-family: 'Rajdhani', 'Arial', sans-serif;
    font-size: 34pt; font-weight: 700; color: #1a4786;
    letter-spacing: 5px; text-transform: uppercase;
  }
  .linea-oro {
    width: 70mm; height: 2px;
    background: linear-gradient(90deg, transparent, #2563eb, transparent);
    margin: 1mm auto;
  }
  .subtitulo-mod {
    font-size: 11pt; color: #555; font-style: italic;
  }
  .nombre-mod {
    font-family: 'Rajdhani', 'Arial', sans-serif;
    font-size: 32pt; font-weight: 600; color: #1a1a2e;
    margin: 2mm 0;
  }
  .desc-mod {
    font-size: 11pt; color: #444; max-width: 70%; line-height: 1.5;
  }
  .curso-mod {
    font-family: 'Rajdhani', 'Arial', sans-serif;
    font-size: 16pt; font-weight: 600; color: #2563eb;
    margin: 1mm 0;
  }

  .footer-mod {
    display: flex; justify-content: center;
    align-items: flex-end; width: 100%;
    padding: 0 15mm; margin-top: 7mm;
  }
  .firma { display: flex; flex-direction: column; align-items: center; gap: 1mm; flex: 1; }
  .firma-img { height: 16mm; object-fit: contain; margin-bottom: 1mm; opacity: 0.9; }
  .firma-linea { width: 42mm; border-top: 1px solid #333; padding-top: 1mm; }
  .firma-nombre { font-size: 8pt; font-weight: bold; color: #333; }
  .firma-puesto { font-size: 7pt; color: #666; }

  .stps {
    position: absolute; bottom: 10mm; left: 16mm;
    font-size: 7pt; color: #888; letter-spacing: 0.5px;
  }
</style>
</head>
<body>
  <div class="banda-sup">
    <div class="banda-left">
      <img class="logo-agasi" src="assets/AGASI.png" alt="AGASI">
    </div>
    <div class="folio-mod">Folio: {{folio}}</div>
  </div>

  <div class="barra-lat"></div>

  <div class="stps">REG.STPS: {{reg_stps}}</div>
  <div class="contenido">
    <div class="titulo-mod">Reconocimiento</div>
    <div class="linea-oro"></div>
    <div class="subtitulo-mod">Se otorga a</div>
    <div class="nombre-mod">{{nombre}}</div>
    <div class="desc-mod">Por haber concluido satisfactoriamente el curso de capacitación:</div>
    <div class="curso-mod">{{curso}}</div>
    <div class="desc-mod">Con una duración de <strong>{{duracion}}</strong> horas<br>Celebrado en {{lugar}} el {{fecha}}</div>

    <div class="footer-mod">
      <div class="firma">
        <img class="firma-img" src="{{firma_instructor}}" alt="" onerror="this.style.display='none'">
        <div class="firma-linea"></div>
        <div class="firma-nombre">{{director_nombre}}</div>
        <div class="firma-puesto">{{director_puesto}}</div>
      </div>
    </div>
  </div>
</body>
</html>
